<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>수학 학습 공간</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="home-shell">
      <section class="home-hero" aria-labelledby="home-title">
        <p class="eyebrow">중등 수학 학습 자료</p>
        <h1 id="home-title">개념부터 연습까지, 필요한 자료를 한곳에서 확인하세요.</h1>
        <p class="hero-copy">
          단원별 프린트와 학습 자료를 정리해두었습니다. 필요한 단원을 골라 바로 내려받을 수 있습니다.
        </p>
        <div class="hero-actions">
          <a class="button primary" href="prints/">프린트 자료실</a>
          <a class="button secondary" href="#notice">학습 안내</a>
        </div>
      </section>

      <section id="notice" class="notice-band" aria-labelledby="notice-title">
        <div>
          <p class="section-kicker">오늘의 안내</p>
          <h2 id="notice-title">프린트 자료실이 준비되었습니다.</h2>
        </div>
        <p>
          단원별 연습지는 자료실에서 확인할 수 있으며, 다운로드 버튼은 추후 구글 드라이브 링크로 연결할 수 있습니다.
        </p>
      </section>
    </main>
  </body>
</html>
